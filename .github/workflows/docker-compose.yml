name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop    # если хотите тестировать develop, но деплоить только с main
  pull_request:
    branches:
      - main

jobs:
  # CI — проверка сборки и тестов (на GitHub runner)
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for services to be ready
        run: |
          for i in {1..30}; do
            if curl -s -f http://localhost:5260/health; then
              echo "Gateway is ready"
              break
            fi
            echo "Waiting for gateway... (attempt $i)"
            sleep 2
          done

      - name: Run tests (optional)
        run: |
          # например, dotnet test
          echo "All services are running — tests would go here"

      - name: Stop containers
        if: always()
        run: docker compose down -v

  # CD — деплой на сервер (только после успешного CI и только для main)
  cd:
    runs-on: ubuntu-latest
    needs: ci               # ждёт успешного завершения ci
    if: github.ref == 'refs/heads/main'   # деплоим только с main
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /durrex-bank/Backend
            git pull origin main
            docker compose down
            docker compose up -d --build
