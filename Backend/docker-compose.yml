services:

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  user-service:
    build:
      context: .
      dockerfile: MyApp.UserService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=durrex_users;Username=postgres;Password=postgres"
      InternalApiKey: "dev-internal-api-key-12345"
      Services__AuthService: "http://auth-service:8080"
    ports:
      - "5004:8080"
    depends_on:
      - postgres

  auth-service:
    build:
      context: .
      dockerfile: MyApp.AuthService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=durrex_auth;Username=postgres;Password=postgres"
      IdentityServer__IssuerUri: "http://auth-service:8080"
      Services__UserService: "http://user-service:8080"
      InternalApiKey: "dev-internal-api-key-12345"
      AdminPassword: "Admin123"
    ports:
      - "5005:8080"
    depends_on:
      - postgres
      - user-service

  core-service:
    build:
      context: .
      dockerfile: MyApp.CoreService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=durrex_core;Username=postgres;Password=postgres"
      InternalApiKey: "dev-internal-api-key-12345"
      ExchangeRates__ApiKey: "YOUR_EXCHANGE_RATE_API_KEY"
      Bank__MasterAccountId: "1"
      RabbitMQ__Host: rabbitmq
    ports:
      - "5208:8080"
    depends_on:
      - postgres
      - rabbitmq

  credit-service:
    build:
      context: .
      dockerfile: MyApp.CreditService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=durrex_credit;Username=postgres;Password=postgres"
      InternalApiKey: "dev-internal-api-key-12345"
      Bank__MasterAccountId: "1"
      RabbitMQ__Host: rabbitmq
    ports:
      - "5209:8080"
    depends_on:
      - postgres
      - rabbitmq

  web-app-settings-service:
    build:
      context: .
      dockerfile: MyApp.WebAppSettingsService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=durrex_web_app_settings;Username=postgres;Password=postgres"
      InternalApiKey: "dev-internal-api-key-12345"
    ports:
      - "5225:8080"
    depends_on:
      - postgres

  mobile-app-settings-service:
    build:
      context: .
      dockerfile: MyApp.MobileAppSettingsService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=durrex_mobile_app_settings;Username=postgres;Password=postgres"
      InternalApiKey: "dev-internal-api-key-12345"
    ports:
      - "5226:8080"
    depends_on:
      - postgres

  gateway:
    build:
      context: .
      dockerfile: MyApp.Gateway/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Oidc__Authority: "http://auth-service:8080"
      Oidc__Audience: "bank.api"
      InternalApiKey: "dev-internal-api-key-12345"
    ports:
      - "5260:8080"
    depends_on:
      - postgres
      - rabbitmq
      - auth-service
      - user-service
      - core-service
      - credit-service

volumes:
  postgres_data:
