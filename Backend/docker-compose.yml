services:

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI (http://localhost:15672)

  core-service:
    build:
      context: .
      dockerfile: MyApp.CoreService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=durrex_core;Username=postgres;Password=postgres"
      InternalApiKey: "dev-internal-api-key-12345"
      ExchangeRates__ApiKey: "YOUR_EXCHANGE_RATE_API_KEY"
      Bank__MasterAccountId: "1"
      RabbitMQ__Host: rabbitmq
    ports:
      - "5208:8080"
    depends_on:
      - postgres
      - rabbitmq

  credit-service:
    build:
      context: .
      dockerfile: MyApp.CreditService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=durrex_credit;Username=postgres;Password=postgres"
      InternalApiKey: "dev-internal-api-key-12345"
      Bank__MasterAccountId: "1"
      RabbitMQ__Host: rabbitmq
    ports:
      - "5209:8080"
    depends_on:
      - postgres
      - rabbitmq

  settings-service:
    build:
      context: .
      dockerfile: MyApp.SettingsService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=durrex_settings;Username=postgres;Password=postgres"
      InternalApiKey: "dev-internal-api-key-12345"
    ports:
      - "5210:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
