services:

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  user-service:
    build:
      context: .
      dockerfile: MyApp.UserService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=durrex_users;Username=postgres;Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379"
      InternalApiKey: "dev-internal-api-key-12345"
      Services__AuthService: "http://auth-service:8080"
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
      Services__MonitoringService: "http://monitoring-service:8080/"
    ports:
      - "5004:8080"
    depends_on:
      - postgres
      - redis

  auth-service:
    build:
      context: .
      dockerfile: MyApp.AuthService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=durrex_auth;Username=postgres;Password=${POSTGRES_PASSWORD}"
      IdentityServer__IssuerUri: "https://swagor-time.ru/services/auth"
      Services__UserService: "http://user-service:8080"
      InternalApiKey: "dev-internal-api-key-12345"
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
      AdminPassword: ${AUTH_ADMIN_PASSWORD}
    volumes:
      - auth-dp-keys:/app/dp-keys
      - auth-signing-keys:/app/keys
    ports:
      - "5005:8080"
    depends_on:
      - postgres
      - user-service

  core-service:
    build:
      context: .
      dockerfile: MyApp.CoreService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=durrex_core;Username=postgres;Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379"
      InternalApiKey: "dev-internal-api-key-12345"
      ExchangeRates__ApiKey: "c19e36bf70cd739d6acb7647"
      Bank__MasterAccountId: "1"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
      Services__MonitoringService: "http://monitoring-service:8080/"
    ports:
      - "5208:8080"
    depends_on:
      - postgres
      - rabbitmq
      - redis

  credit-service:
    build:
      context: .
      dockerfile: MyApp.CreditService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=durrex_credit;Username=postgres;Password=${POSTGRES_PASSWORD}"
      InternalApiKey: "dev-internal-api-key-12345"
      Bank__MasterAccountId: "1"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5209:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  web-app-settings-service:
    build:
      context: .
      dockerfile: MyApp.WebAppSettingsService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=durrex_web_app_settings;Username=postgres;Password=${POSTGRES_PASSWORD}"
      InternalApiKey: "dev-internal-api-key-12345"
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5225:8080"
    depends_on:
      - postgres

  mobile-app-settings-service:
    build:
      context: .
      dockerfile: MyApp.MobileAppSettingsService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=durrex_mobile_app_settings;Username=postgres;Password=${POSTGRES_PASSWORD}"
      InternalApiKey: "dev-internal-api-key-12345"
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5226:8080"
    depends_on:
      - postgres

  monitoring-service:
    build:
      context: .
      dockerfile: MyApp.MonitoringService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=durrex_monitoring;Username=postgres;Password=${POSTGRES_PASSWORD}"
      InternalApiKey: "dev-internal-api-key-12345"
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
      Monitoring__RetentionDays: "30"
      Monitoring__MaxEventsOnDashboard: "250"
      Monitoring__MaxRequestsOnDashboard: "250"
      Monitoring__RequestTracing__Enabled: "true"
      Monitoring__RequestTracing__CaptureSuccessResponses: "true"
    ports:
      - "5230:8080"
    depends_on:
      - postgres

  gateway:
    build:
      context: .
      dockerfile: MyApp.Gateway/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      Oidc__Authority: "https://swagor-time.ru/services/auth"
      Oidc__Audience: "bank.api"
      InternalApiKey: "dev-internal-api-key-12345"
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5260:8080"
    depends_on:
      - postgres
      - rabbitmq
      - auth-service
      - user-service
      - core-service
      - credit-service
      - monitoring-service

  frontend:
    build:
      context: ../Frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - gateway

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gateway
      - frontend
    networks:
      - default

volumes:
  postgres-data:
  auth-dp-keys:
  auth-signing-keys:

